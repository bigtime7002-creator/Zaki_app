name: Zaki Cloud Run Bot
on:
  workflow_dispatch:
    inputs:
      project_id:
        description: 'ضع الـ Project ID الخاص بالمختبر هنا'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: google-github-actions/setup-gcloud@v1
      
      - name: Deploy to Cloud Run
        run: |
          # تسجيل الدخول باستخدام مفتاحك الماستر
          gcloud auth activate-refresh-token ${{ secrets.GCP_TOKEN }}
          
          # اختيار مشروع المختبر
          gcloud config set project ${{ github.event.inputs.project_id }}
          
          # النشر الفوري
          gcloud run deploy zaki-server \
            --source . \
            --region europe-west1 \
            --allow-unauthenticated \
            --port 8080 --quiet
          
          # إظهار الرابط النهائي في النتائج
          echo "Your Server URL is:"
          gcloud run services describe zaki-server --region europe-west1 --format='value(status.url)'
