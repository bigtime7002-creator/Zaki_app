name: Zaki Final Power
on:
  workflow_dispatch:
    inputs:
      project_id:
        description: 'Project ID'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: 'Check & Deploy'
        shell: bash
        env:
          MY_TOKEN: ${{ secrets.GCP_TOKEN }}
        run: |
          # فحص أولي للمفتاح (بدون إظهاره)
          if [ -z "$MY_TOKEN" ]; then
            echo "❌ خطأ قاتل: السيكرت GCP_TOKEN غير موجود في إعدادات GitHub!"
            exit 1
          fi

          # تفعيل الدخول
          gcloud auth activate-refresh-token "$MY_TOKEN" \
            --client-id="407408718192.apps.googleusercontent.com" \
            --client-secret="d9Q0vAL2A6pSp6qE8sPSBv9p"
          
          # ضبط المشروع والنشر
          gcloud config set project ${{ github.event.inputs.project_id }}
          
          gcloud run deploy zaki-server --source . --region europe-west1 --allow-unauthenticated --port 8080 --quiet
