name: Deploy to Cloud Run
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Auth Google Cloud
        uses: 'google-github-actions/auth@v1'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Build and Push
        run: |
          gcloud auth configure-docker --quiet
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/zakaria-app .
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/zakaria-app

      - name: Deploy
        run: |
          gcloud run deploy zakaria-server \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/zakaria-app \
            --region europe-west1 \
            --platform managed \
            --allow-unauthenticated
